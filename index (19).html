<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loyalty Assessment Results — Confidential</title>
<meta name="description" content="Case file finalized. Approved for release.">
<meta property="og:title" content="Loyalty Assessment Results — Confidential">

<style>
:root{
  --ink:#15233f;          /* institutional navy */
  --ink-soft:#3c4a66;
  --paper:#fcfbf6;        /* document sheet */
  --desk:#e7e4da;         /* background behind the sheet */
  --rule:#cfc9b8;         /* hairline rules on paper */
  --stamp:#b3261e;        /* rubber-stamp red */
  --seal:#8c6a1d;         /* seal gold */
  --ok:#1e6b3a;
  --focus:#1a56c4;
  --serif: Georgia, 'Times New Roman', serif;
  --mono: 'Courier New', Courier, monospace;
  --sans: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--desk);color:var(--ink);font-family:var(--serif);line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:var(--focus)}
:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
button{font:inherit;cursor:pointer}

/* ---------- top institutional bar ---------- */
.bar{background:var(--ink);color:#f4f1e6;padding:10px 16px;display:flex;align-items:center;gap:12px}
.bar .seal-mini{flex:0 0 auto}
.bar .t{font-family:var(--serif);letter-spacing:.12em;font-size:12px;text-transform:uppercase}
.bar .t b{display:block;font-size:13px;letter-spacing:.18em}
.bar .right{margin-left:auto;font-family:var(--mono);font-size:11px;opacity:.7;white-space:nowrap}

/* ---------- shared layout ---------- */
.wrap{max-width:880px;margin:0 auto;padding:28px 16px 80px}
.narrow{max-width:720px}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft)}
h1{font-size:clamp(30px,5.4vw,46px);line-height:1.08;margin:.35em 0 .4em;font-weight:700}
h2{font-size:clamp(20px,3.4vw,26px);margin:1.6em 0 .5em}
.lede{font-size:clamp(16px,2.6vw,19px);color:var(--ink-soft);max-width:54ch}

.btn{display:inline-block;background:var(--ink);color:#fff;border:none;border-radius:3px;
  padding:14px 26px;font-family:var(--serif);font-size:17px;letter-spacing:.02em;text-decoration:none}
.btn:hover{background:#0e1830}
.btn.secondary{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
.btn.secondary:hover{background:rgba(21,35,63,.06)}
.btn.big{padding:16px 34px;font-size:18px}
.btn.red{background:var(--stamp)}
.btn.red:hover{background:#8f1d17}
.btn:disabled{opacity:.45;cursor:not-allowed}

.notice{border-left:4px solid var(--seal);background:#fff;padding:14px 18px;font-size:15px;color:var(--ink-soft);margin:26px 0;max-width:62ch}
.notice b{color:var(--ink)}

/* ---------- landing ---------- */
.hero{padding-top:40px}
.hero .stamped{position:relative;display:inline-block}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
.step{background:#fff;border:1px solid var(--rule);padding:18px 16px;border-radius:3px}
.step .k{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--seal);text-transform:uppercase}
.step p{margin:.5em 0 0;font-size:15px;color:var(--ink-soft)}
.specimen{margin-top:46px;position:relative}
.specimen .paper{transform:rotate(-1.2deg);box-shadow:0 18px 50px rgba(21,35,63,.18)}
.footline{margin-top:60px;font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);opacity:.8;letter-spacing:.05em}
@media (max-width:640px){.steps{grid-template-columns:1fr}}

/* ---------- the document sheet ---------- */
.paper{background:var(--paper);border:1px solid #d8d3c2;border-radius:2px;
  box-shadow:0 10px 34px rgba(21,35,63,.14);padding:clamp(22px,5vw,52px);position:relative;overflow:hidden}
.paper::before{content:"";position:absolute;inset:10px;border:1px solid var(--rule);pointer-events:none}
.letterhead{display:flex;gap:18px;align-items:center;border-bottom:2.5px solid var(--ink);padding-bottom:16px;position:relative;z-index:1}
.letterhead .org{font-size:clamp(15px,2.6vw,20px);letter-spacing:.14em;text-transform:uppercase;font-weight:700}
.letterhead .org small{display:block;font-weight:400;font-size:12px;letter-spacing:.22em;color:var(--ink-soft);margin-top:4px}
.meta{width:100%;border-collapse:collapse;margin:18px 0 6px;font-family:var(--mono);font-size:13px}
.meta td{border-bottom:1px solid var(--rule);padding:7px 4px;vertical-align:top}
.meta td:first-child{width:38%;color:var(--ink-soft);letter-spacing:.08em;text-transform:uppercase;font-size:11px}
.verdict{text-align:center;margin:30px 0 6px;position:relative;z-index:1}
.verdict .score{font-size:clamp(44px,9vw,72px);font-weight:700;letter-spacing:.02em;line-height:1}
.verdict .score small{font-size:.38em;color:var(--ink-soft);font-weight:400;letter-spacing:.1em}
.verdict .passfail{display:inline-block;margin-top:10px;font-family:var(--mono);letter-spacing:.3em;font-size:15px;color:var(--ok);border:2px solid var(--ok);padding:5px 16px 4px;text-transform:uppercase}
.verdict .deducted{margin-top:14px;font-size:15px;color:var(--ink-soft)}
.verdict .deducted b{color:var(--stamp)}
.sect-h{font-family:var(--mono);font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-soft);
  border-bottom:1px solid var(--rule);padding-bottom:6px;margin:38px 0 6px}
.clause{padding:16px 2px 14px;border-bottom:1px dashed var(--rule)}
.clause .no{font-family:var(--mono);font-size:12px;letter-spacing:.14em;color:var(--seal);text-transform:uppercase}
.clause .body{margin:.45em 0 .4em;font-size:16.5px}
.clause .ded{font-family:var(--mono);font-size:12.5px;color:var(--stamp);letter-spacing:.06em}
.clause .ded.plus{color:var(--ok)}
.ledger{width:100%;border-collapse:collapse;margin-top:10px;font-family:var(--mono);font-size:13px}
.ledger td{padding:7px 4px;border-bottom:1px solid var(--rule)}
.ledger td:last-child{text-align:right;white-space:nowrap}
.ledger tr.total td{border-top:2.5px solid var(--ink);border-bottom:none;font-weight:700;font-size:14px}
.fineprint{margin-top:34px;font-size:10.5px;color:var(--ink-soft);opacity:.75;line-height:1.5;font-family:var(--mono)}

/* stamps & seal */
.stamp{position:absolute;top:clamp(54px,9vw,84px);right:clamp(10px,4vw,40px);transform:rotate(-9deg);
  border:3px double var(--stamp);color:var(--stamp);font-family:var(--mono);font-weight:700;
  letter-spacing:.3em;font-size:clamp(13px,2.6vw,18px);padding:8px 14px 7px;text-transform:uppercase;
  opacity:.82;mix-blend-mode:multiply;z-index:2;pointer-events:none;animation:stampIn .5s cubic-bezier(.2,1.6,.4,1) .35s backwards}
@keyframes stampIn{from{transform:rotate(-9deg) scale(2.4);opacity:0}to{transform:rotate(-9deg) scale(1);opacity:.82}}
@media (prefers-reduced-motion:reduce){.stamp{animation:none}}

/* ---------- reveal ---------- */
.reveal-gate{text-align:center;margin:44px 0 8px}
.reveal{display:none;margin-top:34px;border-top:2.5px solid var(--ink);padding-top:26px}
.reveal.open{display:block;animation:fadeUp .6s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.reveal.open{animation:none}}
.reveal .truth{font-size:clamp(19px,3.4vw,24px);line-height:1.5}
.reveal .truth b{background:linear-gradient(transparent 62%, #f3e3a0 62%)}
.personal{background:#fff;border:1px solid var(--rule);border-left:4px solid var(--seal);
  padding:18px 20px;margin:22px 0;font-style:italic;font-size:17px;white-space:pre-wrap}
.commission{font-family:var(--mono);font-size:13px;color:var(--ink-soft);letter-spacing:.06em}
.loop-cta{text-align:center;margin-top:34px;padding-top:26px;border-top:1px dashed var(--rule)}
.loop-cta .small{font-size:13px;color:var(--ink-soft);margin-top:10px;font-family:var(--mono)}

/* ---------- form ---------- */
.formcard{background:#fff;border:1px solid var(--rule);border-radius:3px;padding:clamp(18px,4vw,32px);margin-top:22px}
.field{margin:20px 0}
.field label{display:block;font-weight:700;font-size:15.5px;margin-bottom:7px}
.field .hint{font-weight:400;color:var(--ink-soft);font-size:13.5px;display:block;margin-top:2px}
.field input[type=text],.field textarea{width:100%;border:1.5px solid #b9b2a0;border-radius:3px;background:var(--paper);
  font-family:var(--serif);font-size:16px;padding:11px 12px;color:var(--ink)}
.field textarea{min-height:92px;resize:vertical}
.pronouns{display:flex;gap:10px;flex-wrap:wrap}
.pronouns label{display:flex;align-items:center;gap:7px;border:1.5px solid #b9b2a0;border-radius:3px;
  padding:9px 14px;font-weight:400;cursor:pointer;background:var(--paper)}
.pronouns input{accent-color:var(--ink)}
.cats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
@media (max-width:640px){.cats{grid-template-columns:1fr}}
.cat{border:1.5px solid #b9b2a0;border-radius:3px;background:var(--paper);padding:14px 14px 12px;cursor:pointer;position:relative}
.cat:hover{border-color:var(--ink)}
.cat.on{border-color:var(--ink);box-shadow:inset 0 0 0 1.5px var(--ink);background:#fff}
.cat .cn{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;color:var(--seal);text-transform:uppercase}
.cat .ct{font-weight:700;font-size:15.5px;margin:4px 0 3px}
.cat .cd{font-size:13px;color:var(--ink-soft)}
.cat input{position:absolute;opacity:0;pointer-events:none}
.counter{font-family:var(--mono);font-size:12.5px;color:var(--ink-soft);margin-top:8px;letter-spacing:.06em}
.blanks{border-top:1px dashed var(--rule);margin-top:26px;padding-top:6px}
.err{color:var(--stamp);font-size:14px;font-family:var(--mono);margin-top:14px;display:none}
.err.on{display:block}

/* ---------- preview lock ---------- */
.lockwrap{position:relative}
.lockwrap .locked-zone{filter:blur(7px);user-select:none;pointer-events:none}
.lockpanel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:3}
.lockpanel .inner{background:rgba(252,251,246,.96);border:1.5px solid var(--ink);box-shadow:0 14px 40px rgba(21,35,63,.25);
  padding:26px 26px 22px;text-align:center;max-width:380px;margin:0 16px}
.lockpanel .inner .lk{font-family:var(--mono);letter-spacing:.24em;font-size:12px;color:var(--stamp);text-transform:uppercase}
.lockpanel .inner h3{margin:.5em 0 .35em;font-size:21px}
.lockpanel .inner p{font-size:14px;color:var(--ink-soft);margin:0 0 16px}

/* ---------- success ---------- */
.copybox{display:flex;gap:10px;margin:12px 0 4px;flex-wrap:wrap}
.copybox input,.copybox textarea{flex:1;min-width:220px;border:1.5px solid #b9b2a0;border-radius:3px;background:#fff;
  font-family:var(--mono);font-size:13px;padding:11px 12px;color:var(--ink)}
.copybox textarea{min-height:74px;resize:vertical}
.copied{color:var(--ok)!important;border-color:var(--ok)!important}

/* ---------- modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(14,22,40,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal-bg.on{display:flex}
.modal{background:var(--paper);border:1.5px solid var(--ink);max-width:430px;width:100%;padding:26px 24px 22px;border-radius:3px;box-shadow:0 24px 70px rgba(0,0,0,.35)}
.modal h3{margin:0 0 .4em;font-size:21px}
.modal p{font-size:14.5px;color:var(--ink-soft)}
.modal .row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
</style>
</head>
<body>

<header class="bar">
  <span class="seal-mini" id="sealMini"></span>
  <span class="t"><b>National Institute of Relationship Integrity</b>Office of Loyalty Assessment</span>
  <span class="right">FORM 7-B · REV. NEVER</span>
</header>

<main id="app"></main>

<div class="modal-bg" id="modalBg" role="dialog" aria-modal="true">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalBody"></p>
    <div class="row" id="modalRow"></div>
  </div>
</div>

<script>
/* =====================================================
   THE LOYALTY TEST — single-file build (no backend)
   All report data is encoded into the share link itself.
   ===================================================== */

/* ---------- pronoun-free, English-native clause library ---------- */
const CATS = [
  {
    id:'reply', no:'4.2', rank:1, pts:2,
    title:'Response Time Commission',
    desc:'Reads your text. Replies eventually.',
    q:[
      {label:'How long do they take to reply to YOUR texts?', ph:'e.g. 4\u20136 business hours'},
      {label:'And the one thing they reply to instantly?', ph:'e.g. the group chat'}
    ],
    tpl:(b)=>`Average response time to messages from the requesting party: <u>${b[0]}</u>. Average response time to ${b[1]}: 11 seconds. The discrepancy was escalated to senior analysts. The analysts have given up.`
  },
  {
    id:'five', no:'3.2', rank:2, pts:2,
    title:'The \u201cFive More Minutes\u201d Unit',
    desc:'Almost ready since Tuesday.',
    q:[{label:'You\u2019re waiting by the door. They\u2019re \u201calmost ready.\u201d What are they actually doing?', ph:'e.g. starting a full skincare routine'}],
    tpl:(b)=>`A consistent gap was measured between the \u201cfive more minutes\u201d declaration and actual departure. During the waiting period, the subject was documented ${b[0]}. Unit recommendation: stop believing.`
  },
  {
    id:'omw', no:'2.1', rank:3, pts:3,
    title:'The \u201comw\u201d Doctrine',
    desc:'Says \u201con my way.\u201d Is not on any way.',
    q:[{label:'When they text \u201comw\u201d \u2014 where are they actually?', ph:'e.g. still on the couch, in a towel'}],
    tpl:(b)=>`The reliability of the subject\u2019s \u201comw\u201d declarations was audited. In 87% of recorded instances, at the moment of declaration, the subject was ${b[0]}. The declaration has been reclassified from \u201cstatus update\u201d to \u201caspiration.\u201d`
  },
  {
    id:'night', no:'7.4', rank:4, pts:2,
    title:'Blanket & Night Operations Authority',
    desc:'Denies everything. Snores anyway.',
    q:[{label:'What happens at night that they flat-out deny?', ph:'e.g. industrial-grade snoring'}],
    tpl:(b)=>`Overnight monitoring indicates ${b[0]}, contradicting repeated and emphatic denials. Several of the denials were recorded during the act itself.`
  },
  {
    id:'hungry', no:'5.3', rank:5, pts:3,
    title:'Department of \u201cI\u2019m Not Hungry\u201d',
    desc:'Didn\u2019t order. Eats yours.',
    q:[{label:'What food keeps disappearing from your plate?', ph:'e.g. my fries'}],
    tpl:(b)=>`Subject declared \u201cI\u2019m not hungry, just order for yourself,\u201d then consumed approximately 40% of the requesting party\u2019s ${b[0]} during the same sitting. The lab stresses: this is a pattern, not an incident.`
  },
  {
    id:'promise', no:'9.2', rank:6, pts:2,
    title:'Committee of Open Promises',
    desc:'Gym starts Monday. Every Monday.',
    q:[{label:'What do they promise every week that never happens?', ph:'e.g. starting the gym on Monday'}],
    tpl:(b)=>`The commitment \u201c${b[0]}\u201d was recorded 14 times this quarter. Fulfillment rate: 0%. The Committee commends the consistency.`
  },
  {
    id:'pet', no:'8.1', rank:7, pts:2,
    title:'Division of Affection Allocation',
    desc:'You vs. the cat. You lose.',
    q:[{label:'Who or what gets more affection than you at home?', ph:'e.g. the cat / the car / one specific plant'}],
    tpl:(b)=>`Household affection resources were audited. ${b[0]} receives consistent priority over the requesting party, including a dedicated voice developed specifically for the occasion. The lab sympathizes. Rules are rules.`
  },
  {
    id:'stream', no:'6.1', rank:8, pts:4,
    title:'Bureau of Streaming Infidelity',
    desc:'The only cheating we test for.',
    q:[{label:'Which show did you promise to watch together \u2014 that they\u2019re suspected of watching alone?', ph:'e.g. Severance'}],
    tpl:(b)=>`The only act of infidelity detected: circumstantial evidence indicates unauthorized solo viewing of \u201c${b[0]},\u201d in violation of the Joint Viewing Agreement. During the official joint rewatch, the subject performed surprise. Believability rating: low.`,
    dedNote:' \u2014 the most severe in this report'
  }
];

const RANDOMS = [
  { no:'1.1', pts:0, label:'Deduction: 0 points. The incident remains on record.',
    text:'Subject was observed laughing suspiciously at a phone. Deep inspection revealed a video of a dog. Case closed without findings.' },
  { no:'10.3', pts:-1, label:'Reverse deduction applied: +1 point.',
    text:'Subject\u2019s loyalty to the designated side of the bed was found absolute and unwavering.' },
  { no:'11.2', pts:1, label:'Deduction: 1 point.',
    text:'In a controlled simulation requiring a choice between the requesting party and pizza, the subject hesitated for 4 seconds. The hesitation has been logged. Permanently.' },
  { no:'12.1', pts:0, label:'Deduction: 0 points. Finding forwarded to the Bureau of Streaming Infidelity.',
    text:'Subject was recorded saying \u201cone more episode and we\u2019re sleeping\u201d at 11:40 PM. Actual time of sleep: 2:10 AM.' }
];

const CUSTOM_PTS = 2;

/* ---------- utilities ---------- */
const $ = (s, el=document) => el.querySelector(s);
const app = document.getElementById('app');

function esc(s){
  return String(s||'').replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}
function b64uEncode(obj){
  const bytes = new TextEncoder().encode(JSON.stringify(obj));
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function b64uDecode(str){
  const b64 = str.replace(/-/g,'+').replace(/_/g,'/') + '==='.slice((str.length + 3) % 4);
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return JSON.parse(new TextDecoder().decode(bytes));
}
function caseNo(){
  const n = 1000 + Math.floor(Math.random()*9000);
  const L = 'ABCDEF'[Math.floor(Math.random()*6)];
  return `LT-${n}-${L}`;
}
function todayStr(){
  return new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
}
function baseURL(){
  return location.origin + location.pathname;
}
function sealSVG(size){
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100" aria-hidden="true">
    <circle cx="50" cy="50" r="47" fill="none" stroke="currentColor" stroke-width="3"/>
    <circle cx="50" cy="50" r="39" fill="none" stroke="currentColor" stroke-width="1.4"/>
    <g fill="currentColor">
      <path d="M50 30 l5.9 12 13.2 1.9 -9.5 9.3 2.2 13.1 L50 60.1 38.2 66.3 l2.2 -13.1 -9.5 -9.3 13.2 -1.9 Z"/>
      <circle cx="50" cy="14.5" r="2"/><circle cx="50" cy="85.5" r="2"/>
      <circle cx="14.5" cy="50" r="2"/><circle cx="85.5" cy="50" r="2"/>
      <circle cx="25" cy="25" r="1.6"/><circle cx="75" cy="25" r="1.6"/>
      <circle cx="25" cy="75" r="1.6"/><circle cx="75" cy="75" r="1.6"/>
    </g>
  </svg>`;
}
document.getElementById('sealMini').innerHTML = sealSVG(30);

function copyBtn(targetId){
  return `<button class="btn secondary" data-copy="${targetId}">Copy</button>`;
}
function wireCopy(scope){
  scope.querySelectorAll('[data-copy]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const el = document.getElementById(btn.dataset.copy);
      const text = el.value;
      try { await navigator.clipboard.writeText(text); }
      catch(e){ el.select(); document.execCommand('copy'); }
      const old = btn.textContent;
      btn.textContent = 'Copied \u2713';
      btn.classList.add('copied');
      setTimeout(()=>{ btn.textContent = old; btn.classList.remove('copied'); }, 1600);
    });
  });
}

/* ---------- modal ---------- */
const modalBg = document.getElementById('modalBg');
function showModal(title, body, buttons){
  $('#modalTitle').textContent = title;
  $('#modalBody').textContent = body;
  const row = $('#modalRow');
  row.innerHTML = '';
  buttons.forEach(b=>{
    const btn = document.createElement('button');
    btn.className = 'btn' + (b.secondary ? ' secondary' : '');
    btn.textContent = b.label;
    btn.addEventListener('click', ()=>{ hideModal(); b.fn && b.fn(); });
    row.appendChild(btn);
  });
  modalBg.classList.add('on');
}
function hideModal(){ modalBg.classList.remove('on'); }
modalBg.addEventListener('click', e => { if (e.target === modalBg) hideModal(); });

/* ---------- draft state ---------- */
function saveDraft(d){ sessionStorage.setItem('lt_draft', JSON.stringify(d)); }
function loadDraft(){
  try { return JSON.parse(sessionStorage.getItem('lt_draft')); } catch(e){ return null; }
}

/* ---------- report assembly ---------- */
function buildClauses(data){
  const picked = data.c
    .map(sel => ({ cat: CATS.find(c => c.id === sel.id), b: sel.b }))
    .filter(x => x.cat)
    .sort((a, b) => a.cat.rank - b.cat.rank);

  const clauses = picked.map(x => ({
    no: x.cat.no,
    body: x.cat.tpl(x.b.map(esc)),
    pts: x.cat.pts,
    label: `Deduction: ${x.cat.pts} points${x.cat.dedNote || ''}.`
  }));

  if (data.x && data.x.trim()){
    clauses.push({
      no:'9.9',
      body: esc(data.x.trim()),
      pts: CUSTOM_PTS,
      label:`Deduction: ${CUSTOM_PTS} points.`
    });
  }

  (data.r || []).forEach(i=>{
    const r = RANDOMS[i];
    if (r) clauses.push({ no:r.no, body:r.text, pts:r.pts, label:r.label });
  });

  const total = clauses.reduce((s,c)=> s + c.pts, 0);
  const score = 100 - total;
  const worst = clauses.reduce((w,c)=> c.pts > w.pts ? c : w, clauses[0]);
  return { clauses, total, score, worstNo: worst.no };
}

function reportPaperHTML(data, opts){
  const { clauses, total, score } = buildClauses(data);
  const locked = opts && opts.locked;

  const clauseHTML = clauses.map(c=>`
    <div class="clause">
      <div class="no">Section ${c.no}</div>
      <div class="body">${c.body}</div>
      <div class="ded${c.pts < 0 ? ' plus' : ''}">${c.label}</div>
    </div>`).join('');

  const ledgerHTML = `
    <table class="ledger">
      ${clauses.map(c=>`<tr><td>Section ${c.no}</td><td>${c.pts > 0 ? '\u2212' + c.pts : c.pts < 0 ? '+1' : '\u2014'}</td></tr>`).join('')}
      <tr class="total"><td>TOTAL DEDUCTED</td><td>\u2212${total}</td></tr>
      <tr class="total"><td>FINAL SCORE</td><td>${score} / 100</td></tr>
    </table>`;

  return `
  <div class="paper">
    <div class="stamp">Confidential</div>
    <div class="letterhead">
      <span style="color:var(--seal)">${sealSVG(64)}</span>
      <div class="org">National Institute of Relationship Integrity
        <small>Office of Loyalty Assessment \u00b7 Records Division</small>
      </div>
    </div>
    <table class="meta">
      <tr><td>Case No.</td><td>${esc(data.k)}</td></tr>
      <tr><td>Subject</td><td>${esc(data.n).toUpperCase()}</td></tr>
      <tr><td>Requested by</td><td>WITHHELD UNTIL FINAL DETERMINATION</td></tr>
      <tr><td>Date finalized</td><td>${todayStr()}</td></tr>
      <tr><td>Status</td><td>FINALIZED \u2014 APPROVED FOR RELEASE</td></tr>
    </table>
    <div class="verdict">
      <div class="score">${score}<small> / 100</small></div>
      <div class="passfail">Passed</div>
      <div class="deducted">Points deducted: <b>${total}</b>. Itemized findings below.</div>
    </div>
    <div class="${locked ? 'lockwrap' : ''}">
      ${locked ? '<div class="lockpanel"><div class="inner"><div class="lk">Preview locked</div><h3>The findings are sealed.</h3><p>' + esc(data.n) + '\u2019s itemized deductions, the official stamp, and the final determination \u2014 one step away.</p><button class="btn red big" id="unlockBtn">Unlock full report \u2014 $4.99</button></div></div>' : ''}
      <div class="${locked ? 'locked-zone' : ''}">
        <div class="sect-h">Itemized findings \u2014 excerpt</div>
        ${clauseHTML}
        <div class="sect-h">Deduction ledger</div>
        ${ledgerHTML}
      </div>
    </div>
    <p class="fineprint">This assessment was conducted in accordance with protocols that do not exist, by staff who were never hired, at facilities that are, at best, a kitchen. Results are final, binding, and entirely made up. The National Institute of Relationship Integrity is not an institute, is not national, and has, at most, integrity. NIRI Form 7-B (rev. never).</p>
    ${locked ? '' : `
    <div class="reveal-gate">
      <button class="btn big" id="revealBtn">View final determination \u2192</button>
    </div>
    <div class="reveal" id="reveal">
      <div class="eyebrow">Final determination</div>
      <p class="truth">This institute does not exist. Your loyalty was never tested. No committee met. The lab is somebody\u2019s kitchen.<br><br>What is real: <b>someone knows you well enough to write Section ${buildClauses(data).worstNo}.</b></p>
      <div class="personal">${esc(data.m)}</div>
      <p class="commission">COMMISSIONED BY: ${esc(data.f).toUpperCase()}<br>GROUNDS FOR COMMISSION: LOVE</p>
      <div class="loop-cta">
        <a class="btn red big" href="${baseURL()}#/create">Open a file on someone \u2192</a>
        <div class="small">Filing takes 3 minutes. Revenge has never been this organized.</div>
      </div>
    </div>`}
  </div>`;
}

function viewCreate(){
  const d = loadDraft() || {};
  const chosen = new Set((d.c || []).map(x=>x.id));
  const blanksVal = {};
  (d.c || []).forEach(x => blanksVal[x.id] = x.b);

  app.innerHTML = `
  <div class="wrap narrow">
    <div class="eyebrow">Intake form \u00b7 NIRI 7-B</div>
    <h1>Open a file.</h1>
    <p class="lede">Three minutes. Everything you type ends up in an official document, so make it count.</p>

    <div class="formcard">
      <div class="field">
        <label for="fName">Their first name <span class="hint">The subject of the assessment. Your partner, not your ex. We checked \u2014 we can\u2019t check, but still.</span></label>
        <input type="text" id="fName" maxlength="30" value="${esc(d.n||'')}" placeholder="e.g. Sam">
      </div>
      <div class="field">
        <label for="fFrom">Your name <span class="hint">Revealed only at the very end, when it\u2019s already funny.</span></label>
        <input type="text" id="fFrom" maxlength="40" value="${esc(d.f||'')}" placeholder="e.g. Alex">
      </div>

      <div class="field">
        <label>Pick exactly 3 areas of investigation <span class="hint">Choose the three that will make them yell your name from the other room.</span></label>
        <div class="cats" id="cats">
          ${CATS.map(c=>`
            <label class="cat${chosen.has(c.id)?' on':''}" data-id="${c.id}">
              <input type="checkbox" ${chosen.has(c.id)?'checked':''}>
              <div class="cn">Section ${c.no}</div>
              <div class="ct">${c.title}</div>
              <div class="cd">${c.desc}</div>
            </label>`).join('')}
        </div>
        <div class="counter" id="catCount"></div>
      </div>

      <div class="blanks" id="blanks"></div>

      <div class="field">
        <label for="fCustom">Optional: one finding in your own words <span class="hint">We\u2019ll file it as Section 9.9, word for word, inside the official format. Keep it about them \u2014 a habit, a crime against leftovers. No real suspicions, no third parties: that\u2019s not funny, and funny is the whole job.</span></label>
        <textarea id="fCustom" maxlength="220" placeholder="e.g. Subject claims to hate reality TV. Subject has opinions only a regular viewer could hold.">${esc(d.x||'')}</textarea>
      </div>

      <div class="field">
        <label for="fMsg">Your message at the reveal <span class="hint">They see this at the exact moment they realize it\u2019s you. Make it warm. You\u2019ve earned the right.</span></label>
        <textarea id="fMsg" maxlength="400" placeholder="e.g. Gotcha. I love you, you absolute weirdo.">${esc(d.m||'')}</textarea>
      </div>

      <button class="btn big" id="genBtn">Generate the report \u2192</button>
      <div class="err" id="formErr"></div>
    </div>
  </div>`;

  const catsEl = $('#cats');
  const blanksEl = $('#blanks');
  const countEl = $('#catCount');

  function selectedIds(){
    return [...catsEl.querySelectorAll('.cat.on')].map(el => el.dataset.id);
  }
  function renderBlanks(){
    const ids = selectedIds();
    countEl.textContent = `${ids.length} of 3 selected`;
    blanksEl.innerHTML = ids.length ? `<div class="eyebrow" style="margin:18px 0 4px">Your testimony</div>` : '';
    ids.forEach(id=>{
      const c = CATS.find(x=>x.id===id);
      c.q.forEach((q,qi)=>{
        const val = (blanksVal[id] && blanksVal[id][qi]) || '';
        blanksEl.innerHTML += `
        <div class="field">
          <label for="b_${id}_${qi}">${c.title} \u2014 ${q.label}</label>
          <input type="text" id="b_${id}_${qi}" maxlength="90" value="${esc(val)}" placeholder="${q.ph}">
        </div>`;
      });
    });
  }
  catsEl.querySelectorAll('.cat').forEach(card=>{
    card.addEventListener('click', e=>{
      e.preventDefault();
      // persist current blank values before re-render
      selectedIds().forEach(id=>{
        const c = CATS.find(x=>x.id===id);
        blanksVal[id] = c.q.map((q,qi)=> ($('#b_'+id+'_'+qi)||{}).value || '');
      });
      const on = card.classList.contains('on');
      if (!on && selectedIds().length >= 3) {
        countEl.textContent = '3 of 3 selected \u2014 deselect one to swap.';
        return;
      }
      card.classList.toggle('on');
      renderBlanks();
    });
  });
  renderBlanks();

  $('#genBtn').addEventListener('click', ()=>{
    const err = $('#formErr');
    err.classList.remove('on');
    const name = $('#fName').value.trim();
    const from = $('#fFrom').value.trim();
    const msg  = $('#fMsg').value.trim();
    const ids  = selectedIds();

    const fail = (m)=>{ err.textContent = m; err.classList.add('on'); };
    if (!name) return fail('We need their first name. The stamp has to land on someone.');
    if (ids.length !== 3) return fail('Pick exactly 3 areas of investigation.');

    const c = [];
    for (const id of ids){
      const cat = CATS.find(x=>x.id===id);
      const b = cat.q.map((q,qi)=> $('#b_'+id+'_'+qi).value.trim());
      if (b.some(v=>!v)) return fail(`Fill in your testimony for \u201c${cat.title}.\u201d The lab can\u2019t fabricate everything.`);
      c.push({ id, b });
    }
    if (!from) return fail('We need your name \u2014 it only appears at the reveal.');
    if (!msg)  return fail('Write the reveal message. It\u2019s the part they\u2019ll screenshot.');

    // two distinct random clauses
    const i = Math.floor(Math.random()*RANDOMS.length);
    let j = Math.floor(Math.random()*RANDOMS.length);
    if (j === i) j = (j + 1) % RANDOMS.length;

    saveDraft({ v:1, n:name, f:from, c, x:$('#fCustom').value.trim(), m:msg, r:[i,j], k:caseNo() });
    location.hash = '#/preview';
  });
}

function viewReport(data){
  app.innerHTML = `
  <div class="wrap narrow">
    ${reportPaperHTML(data)}
  </div>`;
  wireReveal();
}

function wireReveal(){
  const btn = $('#revealBtn');
  if (!btn) return;
  btn.addEventListener('click', ()=>{
    $('#reveal').classList.add('open');
    btn.parentElement.style.display = 'none';
    $('#reveal').scrollIntoView({ behavior:'smooth', block:'start' });
  });
}

/* ---------- router ---------- */
function route(){
  const h = location.hash || '';
  window.scrollTo(0,0);
  if (h.startsWith('#r=')){
    try {
      const data = b64uDecode(h.slice(3));
      if (data && data.n && data.c) return viewReport(data);
    } catch(e){ /* fall through to landing */ }
  }
  if (h.startsWith('#/create'))  return viewCreate();
  if (h.startsWith('#/preview')) return viewPreview();
  if (h.startsWith('#/success')) return viewSuccess();
  viewLanding();
}
window.addEventListener('hashchange', route);
route();
</script>
